<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>History</title>

<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color: white;
  }

  h2 {
    text-align: center;
    padding: 20px;
    color: #00f0ff;
  }

  table {
    width: 90%;
    margin: auto;
    border-collapse: collapse;
    background: rgba(0,0,0,0.7);
    border-radius: 10px;
    overflow: hidden;
  }

  th, td {
    padding: 12px;
    text-align: center;
    border-bottom: 1px solid #444;
  }

  th {
    background: #00f0ff;
    color: black;
  }

  tr:hover {
    background: rgba(255,255,255,0.1);
  }

  .safe {
    color: #4CAF50;
    font-weight: bold;
  }

  .danger {
    color: red;
    font-weight: bold;
  }

  .back-btn {
    display: block;
    width: 150px;
    margin: 20px auto;
    padding: 10px;
    text-align: center;
    background: #00f0ff;
    color: black;
    text-decoration: none;
    border-radius: 8px;
  }

  .back-btn:hover {
    background: white;
  }

</style>

</head>

<body>

<h2>Prediction History</h2>

<table>
  <tr>
    <th>User</th>
    <th>URL</th>
    <th>Result</th>
  </tr>

  {% for row in data %}
  <tr>
    <td>{{ row[0] }}</td>
    <td>{{ row[1] }}</td>

    {% if row[2] == "Safe" %}
      <td class="safe">Safe</td>
    {% else %}
      <td class="danger">Not Safe</td>
    {% endif %}

  </tr>
  {% endfor %}
</table>

<a href="/" class="back-btn">⬅ Back</a>

</body>
</html>
