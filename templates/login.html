<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#141e30,#243b55);
}

.login-box {
  width: 350px;
  padding: 40px;
  border-radius: 20px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(15px);
  color: white;
  text-align: center;
  box-shadow: 0 0 30px rgba(0,240,255,0.4);
  transition: 0.5s;
}

.login-box:hover {
  transform: scale(1.05);
}

h2 {
  color: #00f0ff;
}

input {
  width: 100%;
  padding: 12px;
  margin: 12px 0;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  background: linear-gradient(45deg,#00f0ff,#00aaff);
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  background: white;
}

a {
  color: #00f0ff;
  text-decoration: none;
}
</style>

</head>

<body>

<div class="login-box">
  <h2>Welcome Back</h2>

  <form method="post">
    <input name="username" placeholder="Username" required>
    <input type="password" name="password" placeholder="Password" required>
    <button>Login</button>
  </form>

  <p>New user? <a href="/register">Register</a></p>
</div>

</body>
</html>
